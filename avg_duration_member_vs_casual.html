<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    #vis.vega-embed {
      width: 100%;
      display: flex;
    }

    #vis.vega-embed details,
    #vis.vega-embed details summary {
      position: relative;
    }
  </style>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/vega@6"></script>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/vega-lite@6.1.0"></script>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/vega-embed@7"></script>
</head>
<body>
  <div id="vis"></div>
  <script>
    (function(vegaEmbed) {
      var spec = {"config": {"view": {"continuousWidth": 300, "continuousHeight": 300}}, "data": {"name": "data-c78968dcc55d0423b06b72bac78876c4"}, "mark": {"type": "bar"}, "encoding": {"color": {"field": "rider_type", "type": "nominal"}, "tooltip": [{"field": "trip_minutes", "format": ".2f", "type": "quantitative"}], "x": {"field": "rider_type", "title": "Rider Type", "type": "nominal"}, "y": {"field": "trip_minutes", "title": "Avg Trip Duration (Minutes)", "type": "quantitative"}}, "height": 400, "title": "Average Trip Duration by Rider Type", "width": 500, "$schema": "https://vega.github.io/schema/vega-lite/v6.1.0.json", "datasets": {"data-c78968dcc55d0423b06b72bac78876c4": [{"rider_type": "Casual", "trip_minutes": 45.83784804986139}, {"rider_type": "Member", "trip_minutes": 15.185315889768397}]}};
      var embedOpt = {"mode": "vega-lite"};

      function showError(el, error){
          el.innerHTML = ('<div style="color:red;">'
                          + '<p>JavaScript Error: ' + error.message + '</p>'
                          + "<p>This usually means there's a typo in your chart specification. "
                          + "See the javascript console for the full traceback.</p>"
                          + '</div>');
          throw error;
      }
      const el = document.getElementById('vis');
      vegaEmbed("#vis", spec, embedOpt)
        .catch(error => showError(el, error));
    })(vegaEmbed);

  </script>
</body>
</html>
